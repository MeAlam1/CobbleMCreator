---
neoforge-1.21.1:
  gradle: |
    repositories {
      maven {
          url = 'https://artefacts.cobblemon.com/releases/'
      }
      maven {
          url = 'https://thedarkcolour.github.io/KotlinForForge/'
      }
    }
    
    dependencies {
      compileOnly("com.cobblemon:mod:1.7.3+1.21.1")
      implementation("com.cobblemon:neoforge:1.7.3+1.21.1")
      implementation("thedarkcolour:kotlinforforge-neoforge:5.10.0") {
        exclude group: "net.neoforged.fancymodloader", module: "loader"
      }
    }
  update_files:
    - ~

name: "Cobblemon"