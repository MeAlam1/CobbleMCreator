defaultvalue: null

scopes:
  local:
    init: ${var.getType().getJavaType(generator.getWorkspace())} ${var.getName()} = null;
    get: ${name}
    set: ${name} = ${opt.removeParentheses(value)};

  global_session:
    init: public static ${var.getType().getJavaType(generator.getWorkspace())} ${var.getName()} = null;
    get: ${JavaModName}Variables.${name}
    set: ${JavaModName}Variables.${name} = ${opt.removeParentheses(value)};